services:
  - type: web
    name: resume-builder-backend
    env: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: ./apps/backend
    region: frankfurt
    plan: starter
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_ORIGIN
        value: https://og-resume-builder.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
